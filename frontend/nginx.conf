server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip static assets for faster delivery
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # SPA client-side routing: always fall back to index.html so React Router
  # can handle deep links like /projects/:id or /share/:token on refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reasonable caching for hashed build assets.
  location /assets/ {
    expires 7d;
    access_log off;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  # Proxy /api/* to the backend service inside the docker-compose network.
  # Only relevant when the frontend is built WITHOUT a build-time
  # VITE_API_URL override (same-origin relative "/api" calls) — for split
  # hosting (Vercel + Render) VITE_API_URL is baked in at build time instead
  # and this block is simply unused.
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
